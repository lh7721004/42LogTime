<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>42 Logtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        function svgToBase64(svg) {
            const encoded = encodeURIComponent(svg)
                .replace(/%([0-9A-F]{2})/g, (_, p1) => String.fromCharCode("0x" + p1));
            return btoa(encoded);
        }

        const faviconSvg = `
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64">
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#38bdf8"/>
            <stop offset="1" stop-color="#0ea5e9"/>
          </linearGradient>
        </defs>
        <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#g)"/>
        <text x="50%" y="53%" text-anchor="middle" dominant-baseline="middle"
              font-family="ui-sans-serif, system-ui, -apple-system" font-size="28" font-weight="800"
              fill="#ffffff">42</text>
      </svg>
    `.trim();

        const faviconBase64 = svgToBase64(faviconSvg);
        const link = document.createElement("link");
        link.rel = "icon";
        link.type = "image/svg+xml";
        link.href = "data:image/svg+xml;base64," + faviconBase64;
        document.head.appendChild(link);
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const KEY_VALUE = {
            monitor_state: "모니터 상태",
            last_monitor_off_time: "마지막 모니터 꺼진 시간",
            last_monitor_on_time: "마지막 모니터 켜진 시간",
            is_locked_screen: "화면 잠금 여부",
            last_screenlock_time: "마지막 화면 잠금 시간",
            last_screenunlock_time: "마지막 화면 잠금 해제 시간",
            updated_at: "업데이트 시간",
            MONITOR_ON: "켜짐",
            MONITOR_OFF: "꺼짐",
        };

        const { useEffect, useMemo, useRef, useState } = React;
        const DEFAULT_DAILY_CAP_HOUR = 12;

        function extractDay(dateValue) {
            if (dateValue == null) return NaN;
            const n = Number(dateValue);
            if (Number.isFinite(n)) return n;
            const m = String(dateValue).match(/(\d{1,2})(?!.*\d)/);
            return m ? Number(m[1]) : NaN;
        }

        function hmsToSeconds(hms) {
            if (!hms || typeof hms !== "string") return 0;
            const parts = hms.split(":").map((x) => Number(x));
            if (parts.length !== 3 || parts.some((n) => !Number.isFinite(n))) return 0;
            const [h, m, s] = parts;
            return Math.max(0, h * 3600 + m * 60 + s);
        }

        function secondsToHms(sec) {
            const s = Math.max(0, Math.floor(sec || 0));
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const r = s % 60;
            return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(r).padStart(2, "0")}`;
        }

        function secondsToHM(sec) {
            const s = Math.max(0, Math.floor(sec || 0));
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            if (h <= 0 && m <= 0) return "0분";
            if (h <= 0) return `${m}분`;
            if (m <= 0) return `${h}시간`;
            return `${h}시간 ${m}분`;
        }

        function hmsToVerticalParts(hms) {
            const [hours, minutes, seconds] = coercePlanTimeDisplay(hms).split(":");
            return [`${hours}H`, `${minutes}M`, `${seconds}S`];
        }

        function clamp01(value) {
            return Math.max(0, Math.min(1, Number(value) || 0));
        }

        function buildCellToneStyle(ratio, tone = "sky", isToday = false) {
            const r = clamp01(ratio);
            const alpha = r > 0 ? (0.08 + r * 0.42) : (isToday ? 0.12 : 0);
            if (tone === "emerald") {
                return {
                    backgroundColor: `rgba(16, 185, 129, ${alpha})`,
                    borderColor: r > 0 ? `rgba(16, 185, 129, ${0.18 + r * 0.26})` : "rgb(226 232 240)",
                };
            }
            return {
                backgroundColor: `rgba(14, 165, 233, ${alpha})`,
                borderColor: isToday
                    ? `rgba(14, 165, 233, ${Math.max(0.35, 0.22 + r * 0.32)})`
                    : (r > 0 ? `rgba(14, 165, 233, ${0.16 + r * 0.24})` : "rgb(226 232 240)"),
            };
        }

        function toDate(input) {
            if (input == null || input === "" || input === 0) return null;
            if (
                typeof input === "number" ||
                (typeof input === "string" && input.trim() !== "" && !isNaN(Number(input)))
            ) {
                const d = new Date(Number(input) * 1000);
                return isNaN(d.getTime()) ? null : d;
            }
            if (typeof input === "string") {
                const d = new Date(input);
                return isNaN(d.getTime()) ? null : d;
            }
            return null;
        }

        function formatTime(input) {
            const d = toDate(input);
            if (!d) return "-";
            const pad = (n) => String(n).padStart(2, "0");
            return `${pad(d.getMonth() + 1)}월${pad(d.getDate())}일 ${pad(d.getHours())}시${pad(d.getMinutes())}분${pad(d.getSeconds())}초`;
        }

        function timeAgoFrom(input) {
            const d = toDate(input);
            if (!d) return "-";
            const diffSec = Math.floor((Date.now() - d.getTime()) / 1000);
            if (diffSec < 0) return "방금(미래 시간)";
            const days = Math.floor(diffSec / 86400);
            const hours = Math.floor((diffSec % 86400) / 3600);
            const mins = Math.floor((diffSec % 3600) / 60);
            if (days > 0) return `${days}일 ${hours}시간 전`;
            if (hours > 0) return `${hours}시간 ${mins}분 전`;
            return `${mins}분 전`;
        }

        function calcPercent(usedSec, maxHour) {
            const maxSec = Math.max(1, Math.floor((Number(maxHour) || 0) * 3600));
            const raw = (Math.max(0, usedSec) / maxSec) * 100;
            return Math.min(100, Math.max(0, raw));
        }

        function parseDateLoose(s, month, year) {
            if (!s) return null;
            const str = String(s).trim();
            if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
                const d = new Date(str + "T00:00:00");
                return isNaN(d.getTime()) ? null : d;
            }
            const m = str.match(/(\d{1,2})\s*월\s*(\d{1,2})\s*일/);
            if (m) {
                const mm = Number(m[1]);
                const dd = Number(m[2]);
                const d = new Date(year || new Date().getFullYear(), mm - 1, dd, 0, 0, 0);
                return isNaN(d.getTime()) ? null : d;
            }
            const day = extractDay(str);
            if (Number.isFinite(day) && Number.isFinite(Number(month))) {
                const d = new Date(year || new Date().getFullYear(), Number(month) - 1, day, 0, 0, 0);
                return isNaN(d.getTime()) ? null : d;
            }
            return null;
        }

        function shiftYearMonth(year, month, delta) {
            const d = new Date(year, month - 1 + delta, 1, 0, 0, 0);
            return { year: d.getFullYear(), month: d.getMonth() + 1 };
        }

        function buildMonthCalendar(year, month) {
            const firstDay = new Date(year, month - 1, 1).getDay();
            const totalDays = new Date(year, month, 0).getDate();
            const cells = Array.from({ length: firstDay }, () => null);
            for (let day = 1; day <= totalDays; day += 1) cells.push(day);
            while (cells.length % 7 !== 0) cells.push(null);
            return cells;
        }

        function coercePlanTimeDisplay(value) {
            if (!value) return "00:00:00";
            const sec = hmsToSeconds(String(value));
            return secondsToHms(sec);
        }

        function parsePlanTimeParts(value) {
            const [hours, minutes, seconds] = coercePlanTimeDisplay(value).split(":");
            return { hours, minutes, seconds };
        }

        function buildPlanTimeValue(parts) {
            const hours = String(Math.min(99, Math.max(0, Number(parts?.hours || 0) || 0))).padStart(2, "0");
            const minutes = String(Math.min(59, Math.max(0, Number(parts?.minutes || 0) || 0))).padStart(2, "0");
            const seconds = String(Math.min(59, Math.max(0, Number(parts?.seconds || 0) || 0))).padStart(2, "0");
            if (hours === "00" && minutes === "00" && seconds === "00") return "";
            return `${hours}:${minutes}:${seconds}`;
        }

        function Badge({ children, tone = "slate" }) {
            const toneMap = {
                slate: "bg-slate-100 text-slate-800",
                sky: "bg-sky-100 text-sky-800",
                emerald: "bg-emerald-100 text-emerald-800",
                rose: "bg-rose-100 text-rose-800",
                amber: "bg-amber-100 text-amber-900",
                violet: "bg-violet-100 text-violet-800",
            };
            return (
                <span className={`inline-flex items-center rounded-full px-2.5 py-1 text-xs font-semibold ${toneMap[tone] || toneMap.slate}`}>
                    {children}
                </span>
            );
        }

        function SkeletonBlock({ className = "" }) {
            return <div className={`animate-pulse rounded-xl bg-slate-200 ${className}`}></div>;
        }

        function Card({ title, subtitle, children, right, is_no_py = false }) {
            return (
                <div className="bg-white rounded-2xl shadow-sm ring-1 ring-slate-200 overflow-hidden">
                    <div className="px-4 py-3 border-b border-slate-100 flex items-center justify-between gap-3">
                        <div className="min-w-0">
                            <div className="text-sm font-bold text-slate-900">{title}</div>
                            {subtitle ? <div className="text-xs text-slate-500 mt-0.5">{subtitle}</div> : null}
                        </div>
                        {right ? <div>{right}</div> : null}
                    </div>
                    <div className={`${is_no_py ? "px-4" : "p-4"}`}>{children}</div>
                </div>
            );
        }

        function KV({ k, v }) {
            return (
                <div className="flex items-center justify-between gap-3 py-2">
                    <div className="text-sm text-slate-600">{KEY_VALUE[k] ?? k}</div>
                    <div className="text-sm font-semibold text-slate-900 text-right break-all">
                        {v === "MONITOR_ON" || v === "MONITOR_OFF" ? KEY_VALUE[v] : v}
                    </div>
                </div>
            );
        }

        function App() {
            const [searchInput, setSearchInput] = useState("");
            const [state, setState] = useState({ status: "loading" });
            const [screenDetailOpen, setScreenDetailOpen] = useState(false);
            const [sortMode, setSortMode] = useState("recent");
            const [monthLoading, setMonthLoading] = useState(false);
            const [viewMonth, setViewMonth] = useState(() => {
                const now = new Date();
                return { year: now.getFullYear(), month: now.getMonth() + 1 };
            });
            const [live, setLive] = useState({
                initialized: false,
                alltimeSec: 0,
                todaySec: 0,
                dayKey: "",
                monthKey: "",
            });
            const [plan, setPlan] = useState({});
            const [planModal, setPlanModal] = useState(null);

            const MAX_HOUR_LS_KEY = "42logtime:maxHour";
            const MAX_DAILY_HOUR_LS_KEY = "42logtime:maxDailyHour";

            const [userMaxHour, setUserMaxHour] = useState(() => {
                const v = Number(localStorage.getItem(MAX_HOUR_LS_KEY));
                return Number.isFinite(v) && v >= 0 ? v : 0;
            });
            const [userMaxHourInput, setUserMaxHourInput] = useState(() => {
                const raw = localStorage.getItem(MAX_HOUR_LS_KEY);
                if (raw == null) return "";
                return String(raw);
            });
            const [userMaxDailyHour, setUserMaxDailyHour] = useState(() => {
                const v = Number(localStorage.getItem(MAX_DAILY_HOUR_LS_KEY));
                return Number.isFinite(v) && v >= 1 && v <= 24 ? v : DEFAULT_DAILY_CAP_HOUR;
            });
            const [userMaxDailyHourInput, setUserMaxDailyHourInput] = useState(() => {
                const raw = localStorage.getItem(MAX_DAILY_HOUR_LS_KEY);
                if (raw == null) return String(DEFAULT_DAILY_CAP_HOUR);
                return String(raw);
            });

            const dailyCapSec = Math.max(3600, Math.min(24 * 3600, (Number(userMaxDailyHour) || DEFAULT_DAILY_CAP_HOUR) * 3600));
            const reloadingRef = useRef(false);
            const logSkeletonCountRef = useRef(6);

            async function loadTime(year = viewMonth.year, month = viewMonth.month) {
                const qs = new URLSearchParams({ year: String(year), month: String(month) });
                const res = await fetch(`/api/time?${qs.toString()}`, { credentials: "include" });
                if (res.status === 401) {
                    const body = await res.json().catch(() => null);
                    if (body && body.authorize_url) {
                        window.location.href = body.authorize_url;
                        return null;
                    }
                }
                if (!res.ok) {
                    const text = await res.text();
                    throw new Error(`API error (${res.status}): ${text}`);
                }
                return await res.json();
            }

            async function loadTimeByUsername(username, year = viewMonth.year, month = viewMonth.month) {
                const u = String(username || "").trim();
                if (!u) throw new Error("유저명을 입력해 주세요.");
                const qs = new URLSearchParams({ username: u, year: String(year), month: String(month) });
                const res = await fetch(`/api/time/search?${qs.toString()}`, { credentials: "include" });
                if (res.status === 401) {
                    const body = await res.json().catch(() => null);
                    if (body && body.authorize_url) {
                        window.location.href = body.authorize_url;
                        return null;
                    }
                }
                if (res.status === 404) {
                    const body = await res.json().catch(() => ({}));
                    throw new Error(body.error === "user not found" ? `유저를 찾을 수 없습니다: ${u}` : `Not found (${res.status})`);
                }
                if (res.status === 400) {
                    const body = await res.json().catch(() => ({}));
                    throw new Error(body.error || "잘못된 요청입니다.");
                }
                if (!res.ok) {
                    const text = await res.text();
                    throw new Error(`API error (${res.status}): ${text}`);
                }
                return await res.json();
            }

            async function loadPlan(year = viewMonth.year, month = viewMonth.month) {
                const qs = new URLSearchParams({ year: String(year), month: String(month) });
                const res = await fetch(`/api/plan?${qs.toString()}`, { credentials: "include" });
                if (res.status === 401) {
                    const body = await res.json().catch(() => null);
                    if (body && body.authorize_url) {
                        window.location.href = body.authorize_url;
                        return null;
                    }
                }
                if (!res.ok) {
                    const text = await res.text();
                    throw new Error(`API error (${res.status}): ${text}`);
                }
                return await res.json();
            }

            async function savePlan(day, goalHms, year = viewMonth.year, month = viewMonth.month) {
                const res = await fetch("/api/plan", {
                    method: "PUT",
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        year,
                        month,
                        day,
                        goal_hms: goalHms || "",
                    }),
                });
                if (res.status === 401) {
                    const body = await res.json().catch(() => null);
                    if (body && body.authorize_url) {
                        window.location.href = body.authorize_url;
                        return null;
                    }
                }
                if (!res.ok) {
                    const text = await res.text();
                    throw new Error(`API error (${res.status}): ${text}`);
                }
                return await res.json();
            }

            function openPlanModal(day, currentValue) {
                const { hours, minutes, seconds } = parsePlanTimeParts(currentValue);
                setPlanModal({ day, hours, minutes, seconds });
            }

            function updatePlanModalPart(part, raw, max = 59) {
                setPlanModal((prev) => {
                    if (!prev) return prev;
                    const digits = String(raw || "").replace(/[^\d]/g, "").slice(0, 2);
                    if (digits === "") return { ...prev, [part]: "" };
                    const n = Number(digits);
                    if (!Number.isFinite(n)) return prev;
                    return { ...prev, [part]: String(Math.min(max, n)) };
                });
            }

            function savePlanModal() {
                if (!planModal) return;
                (async () => {
                    const goalHms = buildPlanTimeValue(planModal);
                    try {
                        const data = await savePlan(planModal.day, goalHms, viewMonth.year, viewMonth.month);
                        setPlan(data?.plan || {});
                        setPlanModal(null);
                    } catch (e) {
                        alert(String(e?.message || e));
                    }
                })();
            }

            useEffect(() => {
                let cancelled = false;
                (async () => {
                    try {
                        const [data, planData] = await Promise.all([
                            loadTime(viewMonth.year, viewMonth.month),
                            loadPlan(viewMonth.year, viewMonth.month),
                        ]);
                        if (!data || cancelled) return;
                        setPlan(planData?.plan || {});
                        setState({ status: "ready", data, isSearchResult: false });
                    } catch (e) {
                        if (!cancelled) setState({ status: "error", error: String(e?.message || e) });
                    }
                })();
                return () => { cancelled = true; };
            }, []);

            useEffect(() => {
                if (state.status !== "ready" || state.isSearchResult || !state?.data?.username) {
                    setPlan({});
                    setPlanModal(null);
                    return;
                }
                let cancelled = false;
                (async () => {
                    try {
                        const data = await loadPlan(viewMonth.year, viewMonth.month);
                        if (!cancelled) {
                            setPlan(data?.plan || {});
                            setPlanModal(null);
                        }
                    } catch {
                        if (!cancelled) {
                            setPlan({});
                            setPlanModal(null);
                        }
                    }
                })();
                return () => { cancelled = true; };
            }, [state.status, state.isSearchResult, state?.data?.username, viewMonth.year, viewMonth.month]);

            async function handleSearch(e) {
                e?.preventDefault();
                const u = searchInput.trim();
                if (!u) {
                    setState((prev) => ({ ...prev, status: "error", error: "유저명을 입력해 주세요." }));
                    return;
                }
                setPlan({});
                setState((prev) => ({ ...prev, status: "loading" }));
                try {
                    const data = await loadTimeByUsername(u, viewMonth.year, viewMonth.month);
                    if (!data) return;
                    setState({ status: "ready", data, isSearchResult: true });
                } catch (e) {
                    setState({ status: "error", error: String(e?.message || e) });
                }
            }

            async function loadSelf() {
                setState((prev) => ({ ...prev, status: "loading" }));
                try {
                    const [data, planData] = await Promise.all([
                        loadTime(viewMonth.year, viewMonth.month),
                        loadPlan(viewMonth.year, viewMonth.month),
                    ]);
                    if (!data) return;
                    setPlan(planData?.plan || {});
                    setState({ status: "ready", data, isSearchResult: false });
                } catch (e) {
                    setState({ status: "error", error: String(e?.message || e) });
                }
            }

            async function changeViewMonth(delta) {
                const next = shiftYearMonth(viewMonth.year, viewMonth.month, delta);
                const currentVisibleLogCount = ((state.data?.days || []).filter((d) => d.hms && d.hms !== "00:00:00")).length;
                logSkeletonCountRef.current = Math.max(1, currentVisibleLogCount || 0);
                setViewMonth(next);
                setMonthLoading(true);
                setPlanModal(null);
                try {
                    const currentUsername = state.data?.username;
                    const isSearchResult = state.isSearchResult;
                    const results = isSearchResult && currentUsername
                        ? [await loadTimeByUsername(currentUsername, next.year, next.month), null]
                        : await Promise.all([loadTime(next.year, next.month), loadPlan(next.year, next.month)]);
                    const data = results[0];
                    const planData = results[1];
                    if (!data) return;
                    setPlan(planData?.plan || {});
                    setState((prev) => ({ ...prev, status: "ready", data }));
                } catch (e) {
                    setState((prev) => ({ ...prev, status: "error", error: String(e?.message || e) }));
                } finally {
                    setMonthLoading(false);
                }
            }

            useEffect(() => {
                if (state.status !== "ready") return;
                const data = state.data || {};
                const { alltime_hms, days = [] } = data;
                const now = new Date();
                const isCurrentViewedMonth = Number(viewMonth.year) === now.getFullYear() && Number(viewMonth.month) === (now.getMonth() + 1);
                const dayKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;
                const monthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
                const alltimeSecBase = hmsToSeconds(alltime_hms);
                const today = now.getDate();
                const todayObj = (days || []).find((d) => extractDay(d.date) === today);
                const todaySecBaseRaw = todayObj ? hmsToSeconds(todayObj.hms) : 0;
                const cap = Math.max(3600, Math.min(24 * 3600, (Number(userMaxDailyHour) || DEFAULT_DAILY_CAP_HOUR) * 3600));
                const todaySecBase = Math.min(cap, todaySecBaseRaw);
                setLive({
                    initialized: isCurrentViewedMonth,
                    alltimeSec: alltimeSecBase,
                    todaySec: todaySecBase,
                    dayKey,
                    monthKey,
                });
            }, [state.status, state.data, userMaxDailyHour, viewMonth.year, viewMonth.month]);

            useEffect(() => {
                if (state.status !== "ready") return;
                const lsRaw = localStorage.getItem(MAX_HOUR_LS_KEY);
                if (lsRaw != null) return;
                const serverMax = Number(state.data?.max_hour);
                if (Number.isFinite(serverMax) && serverMax >= 0) {
                    setUserMaxHour(serverMax);
                    setUserMaxHourInput(String(serverMax));
                    localStorage.setItem(MAX_HOUR_LS_KEY, String(serverMax));
                }
            }, [state.status, state.data]);

            useEffect(() => {
                if (state.status !== "ready") return;
                const data = state.data || {};
                const hasLocation = !!data.location;
                const now = new Date();
                const isCurrentViewedMonth = Number(viewMonth.year) === now.getFullYear() && Number(viewMonth.month) === (now.getMonth() + 1);
                if (!hasLocation || !isCurrentViewedMonth) return;

                const isSearchResult = state.isSearchResult;
                const currentUsername = state.data?.username;

                const id = setInterval(async () => {
                    const nowTick = new Date();
                    const curDayKey = `${nowTick.getFullYear()}-${String(nowTick.getMonth() + 1).padStart(2, "0")}-${String(nowTick.getDate()).padStart(2, "0")}`;
                    const curMonthKey = `${nowTick.getFullYear()}-${String(nowTick.getMonth() + 1).padStart(2, "0")}`;
                    let dayChanged = false;
                    let monthChanged = false;

                    setLive((prev) => {
                        if (!prev.initialized) return prev;
                        dayChanged = prev.dayKey && curDayKey !== prev.dayKey;
                        monthChanged = prev.monthKey && curMonthKey !== prev.monthKey;
                        if (monthChanged) {
                            return { ...prev, alltimeSec: 0, todaySec: 0, dayKey: curDayKey, monthKey: curMonthKey };
                        }
                        if (dayChanged) {
                            return { ...prev, todaySec: 0, dayKey: curDayKey, monthKey: curMonthKey };
                        }
                        const capSec = Math.max(3600, Math.min(24 * 3600, (Number(userMaxDailyHour) || DEFAULT_DAILY_CAP_HOUR) * 3600));
                        const atCap = prev.todaySec >= capSec;

                                                const dayHmsCapped = todayObj?.date === d.date ? todayHmsShown : secondsToHms(Math.min(hmsToSeconds(d.hms), dailyCapSec));
                                                return (
                                                    <div key={d.date} className="py-3 flex items-center justify-between">
                                                        <div className="text-sm font-semibold text-slate-900">{d.date}</div>
                                                        <div className="flex items-center gap-3">
                                                            <div className="text-xs text-slate-500">{secondsToHM(hmsToSeconds(dayHmsCapped))}</div>
                                                            <div className="font-mono text-slate-700">{dayHmsCapped}</div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </Card>

                                {isSelfView ? (
                                    <Card title={monthLoading ? <SkeletonBlock className="h-5 w-40" /> : `${month}월 학습 계획(${planSummaryHms})`}>
                                        <div className="grid grid-cols-7 gap-2">
                                            {weekdayLabels.map((label, weekdayIdx) => (
                                                <div key={label} className={["px-1 py-2 text-center text-xs font-bold", weekdayIdx === 0 || weekdayIdx === 6 ? "text-rose-500" : "text-slate-500"].join(" ")}>{label}</div>
                                            ))}
                                            {monthLoading ? calendarCells.map((day, idx) => (
                                                <div key={`plan-skeleton-${day ?? idx}`} className={day == null ? "h-[84px] sm:min-h-[112px]" : "h-[84px] sm:min-h-[132px] rounded-md sm:rounded-[22px] border border-slate-200 bg-white p-2 sm:p-3"}>
                                                    {day == null ? null : (
                                                        <div className="flex h-full flex-col justify-between">
                                                            <SkeletonBlock className="h-4 w-5" />
                                                            <div className="space-y-1 sm:hidden">
                                                                <SkeletonBlock className="h-2 w-8" />
                                                                <SkeletonBlock className="h-2 w-8" />
                                                                <SkeletonBlock className="h-2 w-8" />
                                                            </div>
                                                            <div className="hidden sm:block space-y-2">
                                                                <SkeletonBlock className="h-5 w-24" />
                                                                <SkeletonBlock className="h-10 w-full rounded-xl" />
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            )) : calendarCells.map((day, idx) => {
                                                if (day == null) {
                                                    return <div key={`blank-${idx}`} className="h-[84px] sm:min-h-[112px] rounded-md sm:rounded-[22px] bg-transparent" />;
                                                }
                                                const actualSec = actualByDay.get(day) || 0;
                                                const actualHms = secondsToHms(actualSec);
                                                const rawGoalValue = plan[String(day)];
                                                const goalHms = coercePlanTimeDisplay(rawGoalValue);
                                                const cellDate = new Date(currentYear, monthNum - 1, day, 0, 0, 0);
                                                const isTodayCell = cellDate.getTime() === monthToday.getTime();
                                                const isPast = cellDate.getTime() < monthToday.getTime();
                                                const isFuture = cellDate.getTime() > monthToday.getTime();
                                                const weekday = cellDate.getDay();
                                                const isWeekend = weekday === 0 || weekday === 6;
                                                const isoDate = `${currentYear}-${String(monthNum).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
                                                const isHoliday = holidaySet.has(isoDate);
                                                const goalSec = hmsToSeconds(goalHms);
                                                const actualRatio = capSec > 0 ? actualSec / capSec : 0;
                                                const goalRatio = capSec > 0 ? goalSec / capSec : 0;
                                                const toneStyle = isFuture ? buildCellToneStyle(goalRatio, "emerald", false) : buildCellToneStyle(actualRatio, "sky", isTodayCell);

                                                return (
                                                    <button
                                                        type="button"
                                                        key={day}
                                                        onClick={() => (isTodayCell || isFuture) ? openPlanModal(day, plan[String(day)]) : null}
                                                        style={toneStyle}
                                                        className={["min-w-0 h-[84px] sm:min-h-[132px] rounded-md sm:rounded-[22px] border p-2 sm:p-3 text-left", isTodayCell || isFuture ? "cursor-pointer hover:bg-slate-50" : "cursor-default"].join(" ")}
                                                    >
                                                        <div className="flex items-center justify-between gap-1">
                                                            <div className={`text-[13px] sm:text-sm font-extrabold ${(isWeekend || isHoliday) ? "text-rose-500" : "text-slate-900"}`}>{day}</div>
                                                            {isTodayCell ? <span className="hidden sm:inline"><Badge tone="sky">오늘</Badge></span> : null}
                                                        </div>
                                                        <div className="mt-4 min-h-[28px] sm:hidden">
                                                            <div className={`flex flex-col items-start leading-[1.05] text-[9px] font-semibold font-mono ${isPast || isTodayCell ? "text-sky-700" : "text-slate-600"}`}>
                                                                {((isPast || isTodayCell) ? hmsToVerticalParts(actualHms) : hmsToVerticalParts(goalHms)).map((part, partIdx) => (
                                                                    <span key={partIdx}>{part}</span>
                                                                ))}
                                                            </div>
                                                        </div>
                                                        <div className={`hidden sm:flex sm:h-[88px] sm:flex-col ${isTodayCell ? "sm:justify-start" : "sm:justify-between"}`}>
                                                            {isPast || isTodayCell ? <div className="mt-3 min-w-0"><div className="mt-1 block min-w-0 overflow-hidden text-ellipsis whitespace-nowrap font-mono text-sm font-bold text-sky-600">{actualHms}</div></div> : null}
                                                            {isTodayCell || isFuture ? <div className={`${isTodayCell ? "mt-0.5" : "mt-3"} min-w-0`}><div className="block w-full min-w-0 overflow-hidden text-ellipsis whitespace-nowrap rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm font-semibold font-mono text-slate-900">{goalHms}</div></div> : null}
                                                        </div>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </Card>
                                ) : null}

                                <div className="w-full flex justify-center pt-4">
                                    <div className="flex flex-col justify-center gap-1">
                                        <div className="w-full text-center text-[#444444] font-bold">왜 intra42.fr의 시간과 다르게 뜨나요?</div>
                                        <div className="text-xs break-all max-w-full">intra42.fr에서는 <b>분 단위</b>, 42Time은 <b>초 단위</b>로 표시합니다.</div>
                                        <div className="text-xs break-all max-w-full"><b>일 최대 12시간</b>으로 자동 제한됩니다.</div>
                                        <div className="text-xs break-all max-w-full">학습시간을 조회하는 즉시 <b>실시간으로 자동 갱신</b>합니다.</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {planModal ? (
                            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 px-4" onClick={() => setPlanModal(null)}>
                                <div className="w-full max-w-sm rounded-2xl bg-white p-5 shadow-xl ring-1 ring-slate-200" onClick={(e) => e.stopPropagation()}>
                                    <div className="text-lg font-extrabold text-slate-900">{viewMonth.month}월 {planModal.day}일 목표 시간</div>
                                    <div className="mt-4 grid grid-cols-3 gap-3">
                                        <div>
                                            <div className="mb-1 text-xs font-semibold text-slate-500">시</div>
                                            <input value={planModal.hours} onChange={(e) => updatePlanModalPart("hours", e.target.value, 99)} inputMode="numeric" pattern="[0-9]*" className="w-full rounded-xl border border-slate-300 px-3 py-2 text-center text-sm font-semibold outline-none ring-sky-200 focus:ring-2" />
                                        </div>
                                        <div>
                                            <div className="mb-1 text-xs font-semibold text-slate-500">분</div>
                                            <input value={planModal.minutes} onChange={(e) => updatePlanModalPart("minutes", e.target.value, 59)} inputMode="numeric" pattern="[0-9]*" className="w-full rounded-xl border border-slate-300 px-3 py-2 text-center text-sm font-semibold outline-none ring-sky-200 focus:ring-2" />
                                        </div>
                                        <div>
                                            <div className="mb-1 text-xs font-semibold text-slate-500">초</div>
                                            <input value={planModal.seconds} onChange={(e) => updatePlanModalPart("seconds", e.target.value, 59)} inputMode="numeric" pattern="[0-9]*" className="w-full rounded-xl border border-slate-300 px-3 py-2 text-center text-sm font-semibold outline-none ring-sky-200 focus:ring-2" />
                                        </div>
                                    </div>
                                    <div className="mt-5 flex items-center justify-between gap-2">
                                        <button
                                            type="button"
                                            onClick={() => {
                                                (async () => {
                                                    try {
                                                        const data = await savePlan(planModal.day, "", viewMonth.year, viewMonth.month);
                                                        setPlan(data?.plan || {});
                                                        setPlanModal(null);
                                                    } catch (e) {
                                                        alert(String(e?.message || e));
                                                    }
                                                })();
                                            }}
                                            className="rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50"
                                        >
                                            초기화
                                        </button>
                                        <div className="flex items-center gap-2">
                                            <button type="button" onClick={() => setPlanModal(null)} className="rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50">취소</button>
                                            <button type="button" onClick={savePlanModal} className="rounded-xl bg-sky-600 px-4 py-2 text-sm font-bold text-white hover:bg-sky-700">저장</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : null}

                        <Footer />
                    </div>
                );
            }, [state, screenDetailOpen, live, sortMode, userMaxHour, userMaxHourInput, userMaxDailyHour, userMaxDailyHourInput, searchInput, plan, planModal, viewMonth.year, viewMonth.month, monthLoading]);

            return content;
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>

</html>
